      - "traefik.http.routers.keahubinnovation-quotes.tls=true"
      - "traefik.http.middlewares.keahubinnovation-strip-quotes.stripprefix.prefixes=/k1/api"
      - "traefik.http.middlewares.keahubinnovation-cors-quotes.headers.accesscontrolalloworiginlist=https://kealabs.cloud,https://www.kealabs.cloud,https://srv1023256.hstgr.cloud,https://kealabs.com.br,https://www.kealabs.com.br,http://localhost:3000"
      - "traefik.http.middlewares.keahubinnovation-cors-quotes.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.keahubinnovation-cors-quotes.headers.accesscontrolallowheaders=Content-Type,Authorization,Accept"
      - "traefik.http.middlewares.keahubinnovation-cors-quotes.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.keahubinnovation-cors-quotes.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.keahubinnovation-cors-quotes.headers.addvaryheader=true"
      - "traefik.http.routers.keahubinnovation-quotes.middlewares=keahubinnovation-strip-quotes,keahubinnovation-cors-quotes"
      - "traefik.http.services.keahubinnovation-quotes.loadbalancer.server.port=8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - easypanel

  # ── CHAT ─────────────────────────────────────────────────────────────────
