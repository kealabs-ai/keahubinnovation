      - "traefik.http.middlewares.keahubinnovation-cors-chat.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.keahubinnovation-cors-chat.headers.accesscontrolallowheaders=Content-Type,Authorization,Accept"
      - "traefik.http.middlewares.keahubinnovation-cors-chat.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.keahubinnovation-cors-chat.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.keahubinnovation-cors-chat.headers.addvaryheader=true"
      - "traefik.http.routers.keahubinnovation-chat.middlewares=keahubinnovation-strip-chat,keahubinnovation-cors-chat"
      - "traefik.http.services.keahubinnovation-chat.loadbalancer.server.port=8000"
