services:

  # ── CLIENTS ──────────────────────────────────────────────────────────────
  clients-service:
    image: keahubinnovation/clients:latest
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keahubinnovation-clients.rule=(Host(`srv1023256.hstgr.cloud`) || Host(`kealabs.cloud`) || Host(`www.kealabs.cloud`)) && PathPrefix(`/k1/api/clients`)"
      - "traefik.http.routers.keahubinnovation-clients.entrypoints=https"
      - "traefik.http.routers.keahubinnovation-clients.tls=true"
      - "traefik.http.middlewares.keahubinnovation-strip-clients.stripprefix.prefixes=/k1/api"
      - "traefik.http.middlewares.keahubinnovation-cors-clients.headers.accesscontrolalloworiginlist=https://kealabs.cloud,https://www.kealabs.cloud,https://srv1023256.hstgr.cloud,https://kealabs.com.br,https://www.kealabs.com.br,http://localhost:3000"
      - "traefik.http.middlewares.keahubinnovation-cors-clients.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.keahubinnovation-cors-clients.headers.accesscontrolallowheaders=Content-Type,Authorization,Accept"
      - "traefik.http.middlewares.keahubinnovation-cors-clients.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.keahubinnovation-cors-clients.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.keahubinnovation-cors-clients.headers.addvaryheader=true"
      - "traefik.http.routers.keahubinnovation-clients.middlewares=keahubinnovation-strip-clients,keahubinnovation-cors-clients"
      - "traefik.http.services.keahubinnovation-clients.loadbalancer.server.port=8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - easypanel

