      - "traefik.http.middlewares.keahubinnovation-cors-settings.headers.accesscontrolallowheaders=Content-Type,Authorization,Accept"
      - "traefik.http.middlewares.keahubinnovation-cors-settings.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.keahubinnovation-cors-settings.headers.accesscontrolmaxage=86400"
