services:

  # ── CLIENTS ──────────────────────────────────────────────────────────────
  clients-service:
    image: keahubinnovation/clients:latest
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keahubinnovation-clients.rule=(Host(`${SERVER_HOST}`) || Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)) && PathPrefix(`/api/clients`)"
      - "traefik.http.routers.keahubinnovation-clients.entrypoints=https"
      - "traefik.http.routers.keahubinnovation-clients.tls=true"
      - "traefik.http.middlewares.keahubinnovation-strip-clients.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.keahubinnovation-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.keahubinnovation-cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.keahubinnovation-cors.headers.accesscontrolallowheaders=Content-Type,Authorization"
      - "traefik.http.middlewares.keahubinnovation-cors.headers.accesscontrolmaxage=1728000"
      - "traefik.http.middlewares.keahubinnovation-cors.headers.addvaryheader=true"
      - "traefik.http.routers.keahubinnovation-clients.middlewares=keahubinnovation-strip-clients,keahubinnovation-cors"
      - "traefik.http.services.keahubinnovation-clients.loadbalancer.server.port=8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - easypanel

  # ── QUOTES ───────────────────────────────────────────────────────────────
