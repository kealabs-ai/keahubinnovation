      - "traefik.http.routers.keahubinnovation-quotes.entrypoints=https"
      - "traefik.http.routers.keahubinnovation-quotes.tls=true"
      - "traefik.http.middlewares.keahubinnovation-strip-quotes.stripprefix.prefixes=/api"
      - "traefik.http.routers.keahubinnovation-quotes.middlewares=keahubinnovation-strip-quotes,keahubinnovation-cors"
      - "traefik.http.services.keahubinnovation-quotes.loadbalancer.server.port=8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - easypanel

  # ── CHAT ─────────────────────────────────────────────────────────────────
